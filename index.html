<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Crucial for mobile scaling and safe area layouts -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>iPhone Call Screen Prop</title>

    <!-- PWA / iOS Home Screen App Capabilities -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Call Prop">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">

    <!-- iOS App Icons (Replace URLs with your actual icon image locations) -->
    <link rel="apple-touch-icon" href="https://via.placeholder.com/180/000000/FFFFFF?text=Call">
    <link rel="apple-touch-startup-image" href="https://via.placeholder.com/512/000000/FFFFFF?text=Call">

    <!-- Import official Google Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    
    <style>
        :root {
            --ios-red: #FF3B30;
            --ios-green: #34C759;
            --ios-gray: rgba(255, 255, 255, 0.15);
        }

        html, body {
            margin: 0;
            padding: 0;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            width: 100vw;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Helvetica Neue", Helvetica, Arial, sans-serif;
            user-select: none;
            -webkit-user-select: none;
            overflow: hidden;
            /* Prevents overscroll bounce physics in Safari standalone mode */
            overscroll-behavior: none; 
            position: fixed; 
        }

        /* iOS Blue-Green blurred background */
        .iphone-screen {
            width: 100%;
            height: 100%;
            max-width: 100%;
            max-height: 100%;
            background: linear-gradient(145deg, #0b252e 0%, #061c14 50%, #000000 100%);
            position: relative;
            overflow: hidden;
            color: #fff;
            box-sizing: border-box;
            /* Leverages the iPhone's Dynamic Island/Notch dynamic spacing */
            padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0;
        }
        
        .iphone-screen::before {
            content: '';
            position: absolute;
            top: -20%;
            left: -20%;
            width: 140%;
            height: 140%;
            background: 
                radial-gradient(circle at 20% 30%, #1a5268 0%, transparent 45%),
                radial-gradient(circle at 80% 40%, #144931 0%, transparent 50%);
            filter: blur(60px);
            opacity: 0.85;
            z-index: 0;
            pointer-events: none;
        }

        .contact-info {
            text-align: center;
            margin-top: 14vh; /* Adjusted slightly to clear the translucent iOS status bar */
            position: relative;
            z-index: 1;
        }

        .contact-name {
            font-size: 36px;
            font-weight: 300;
            letter-spacing: -0.5px;
            margin: 0 0 4px 0;
        }

        .status-text {
            font-size: 17px;
            color: rgba(255, 255, 255, 0.55);
            font-weight: 400;
            letter-spacing: -0.2px;
        }

        #incoming-view, #active-view {
            display: flex;
            flex-direction: column;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            box-sizing: border-box;
            z-index: 1;
            padding-bottom: env(safe-area-inset-bottom); /* Fixes button cutoff near Home Bar */
        }

        #active-view {
            display: none;
        }

        .incoming-actions {
            margin-top: auto;
            margin-bottom: 8vh;
            display: flex;
            justify-content: space-around;
            padding: 0 10vw;
        }

        .controls-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 3.5vh 4vw;
            padding: 0 12vw;
            margin-top: auto;
            margin-bottom: 5vh;
        }

        .action-button-container, .control-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-label, .control-label {
            font-size: 13px;
            color: #fff;
            margin-top: 8px;
            font-weight: 400;
            letter-spacing: -0.1px;
        }

        .control-label {
            color: rgba(255, 255, 255, 0.9);
            font-size: 12px;
        }

        .btn-circle {
            width: 76px;
            height: 76px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            border: none;
        }

        .btn-decline { background-color: var(--ios-red); }
        .btn-accept { background-color: var(--ios-green); }

        .control-icon {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background-color: var(--ios-gray);
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .material-symbols-outlined {
            color: #fff;
            font-size: 32px;
            font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' 200, 'opsz' 24;
        }

        .icon-contacts {
            font-variation-settings: 'FILL' 1, 'wght' 200, 'GRAD' 200, 'opsz' 24;
        }

        .icon-call-filled {
            font-variation-settings: 'FILL' 1, 'wght' 300, 'GRAD' 200, 'opsz' 24;
        }

        .control-item.active .control-icon {
            background-color: #fff;
        }
        .control-item.active .control-icon .material-symbols-outlined {
            color: #000;
        }

        .icon-flip {
            transform: rotate(135deg);
        }

        .end-call-wrapper {
            display: flex;
            justify-content: center;
            margin-bottom: 8vh;
        }

        #black-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.12s ease-out;
        }
    </style>
</head>
<body>

    <div class="iphone-screen">
        
        <!-- Incoming Call UI -->
        <div id="incoming-view">
            <div class="contact-info">
                <h1 class="contact-name">Boss</h1>
                <div class="status-text">mobile</div>
            </div>
            
            <div class="incoming-actions">
                <div class="action-button-container" onclick="declineCall()">
                    <div class="btn-circle btn-decline">
                        <span class="material-symbols-outlined icon-call-filled icon-flip">call</span>
                    </div>
                    <span class="btn-label">Decline</span>
                </div>
                <div class="action-button-container" onclick="answerCall()">
                    <div class="btn-circle btn-accept">
                        <span class="material-symbols-outlined icon-call-filled">call</span>
                    </div>
                    <span class="btn-label">Accept</span>
                </div>
            </div>
        </div>

        <!-- Active Call UI -->
        <div id="active-view">
            <div class="contact-info">
                <h1 class="contact-name">Boss</h1>
                <div class="status-text" id="timer">00:00</div>
            </div>

            <div class="controls-grid">
                <div class="control-item" onclick="this.classList.toggle('active')">
                    <div class="control-icon">
                        <span class="material-symbols-outlined">mic_off</span>
                    </div>
                    <span class="control-label">mute</span>
                </div>
                <div class="control-item" onclick="this.classList.toggle('active')">
                    <div class="control-icon">
                        <span class="material-symbols-outlined">apps</span>
                    </div>
                    <span class="control-label">keypad</span>
                </div>
                <div class="control-item" onclick="this.classList.toggle('active')">
                    <div class="control-icon">
                        <span class="material-symbols-outlined">volume_up</span>
                    </div>
                    <span class="control-label">speaker</span>
                </div>
                <div class="control-item">
                    <div class="control-icon">
                        <span class="material-symbols-outlined">add</span>
                    </div>
                    <span class="control-label">add call</span>
                </div>
                <div class="control-item">
                    <div class="control-icon">
                        <span class="material-symbols-outlined">videocam</span>
                    </div>
                    <span class="control-label">FaceTime</span>
                </div>
                <div class="control-item">
                    <div class="control-icon">
                        <span class="material-symbols-outlined icon-contacts">account_circle</span>
                    </div>
                    <span class="control-label">contacts</span>
                </div>
            </div>

            <div class="end-call-wrapper">
                <div class="btn-circle btn-decline" onclick="endCall()">
                    <span class="material-symbols-outlined icon-call-filled icon-flip">call</span>
                </div>
            </div>
        </div>

        <!-- Fade Overlay Layer -->
        <div id="black-screen"></div>
    </div>

    <script>
        let callTimerInterval;
        let callSeconds = 0;

        const incomingView = document.getElementById('incoming-view');
        const activeView = document.getElementById('active-view');
        const blackScreen = document.getElementById('black-screen');
        const timerDisplay = document.getElementById('timer');
        const controlItems = document.querySelectorAll('.control-item');

        // Prevent general touch dragging scrolling behavior on the document level 
        document.addEventListener('touchmove', function(e) {
            e.preventDefault();
        }, { passive: false });

        function formatTime(totalSeconds) {
            const minutes = Math.floor(totalSeconds / 60);
            const seconds = totalSeconds % 60;
            return `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        function answerCall() {
            incomingView.style.display = 'none';
            activeView.style.display = 'flex';
            callSeconds = 0;
            timerDisplay.textContent = "00:00";
            
            callTimerInterval = setInterval(() => {
                callSeconds++;
                timerDisplay.textContent = formatTime(callSeconds);
            }, 1000);
        }

        function declineCall() {
            triggerBlackScreen();
        }

        function endCall() {
            clearInterval(callTimerInterval);
            triggerBlackScreen();
        }

        function triggerBlackScreen() {
            blackScreen.style.opacity = '1';
            blackScreen.style.pointerEvents = 'auto';

            setTimeout(() => {
                resetCallUI();
                blackScreen.style.opacity = '0';
                blackScreen.style.pointerEvents = 'none';
            }, 7000);
        }

        function resetCallUI() {
            activeView.style.display = 'none';
            incomingView.style.display = 'flex';
            controlItems.forEach(item => item.classList.remove('active'));
        }
    </script>
</body>
</html>
